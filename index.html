<html lang="zh-TW">

<title>承興 vs iEvents 架構對照</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --brand: #1a2d5c;
    --bg: #ffffff;
    --bg-soft: #f7f8fa;
    --text-1: #1a2d5c;
    --text-2: #4a5568;
    --text-3: #718096;
    --text-4: #a0aec0;
    --border: #e2e8f0;
    --border-soft: #edf0f4;

    /* status colors */
    --st-ok: #10b981;          /* 可用 綠 */
    --st-ok-soft: #d1fae5;
    --st-partial: #f59e0b;     /* 部分 黃 */
    --st-partial-soft: #fef3c7;
    --st-new: #ef4444;         /* 需新做 紅 */
    --st-new-soft: #fee2e2;
    --st-hide: #6b7280;        /* 隱藏 灰 */
    --st-hide-soft: #f3f4f6;
  }
  body {
    background: var(--bg);
    color: var(--text-1);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans TC", "PingFang TC", sans-serif;
    font-size: 14px;
    line-height: 1.6;
  }

  .header {
    position: sticky; top: 0; z-index: 100;
    background: #fff;
    border-bottom: 1px solid var(--border);
    padding: 18px 40px;
    display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 1px 4px rgba(26,45,92,0.04);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .header-logo {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--brand); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 14px;
  }
  .header h1 { font-size: 18px; color: var(--text-1); font-weight: 700; }
  .header h1 .sub { font-size: 12px; color: var(--text-3); font-weight: 400; margin-left: 10px; }

  .summary-bar {
    background: var(--bg-soft);
    border-bottom: 1px solid var(--border-soft);
    padding: 18px 40px;
  }
  .stats { display: flex; gap: 28px; flex-wrap: wrap; align-items: center; }
  .stat { display: flex; align-items: baseline; gap: 6px; }
  .stat-num { font-size: 20px; font-weight: 700; }
  .stat-label { font-size: 12px; color: var(--text-3); }
  .stat-num.ok { color: var(--st-ok); }
  .stat-num.partial { color: var(--st-partial); }
  .stat-num.new { color: var(--st-new); }
  .stat-num.hide { color: var(--st-hide); }

  .filter-bar {
    padding: 14px 40px;
    display: flex; gap: 8px; flex-wrap: wrap;
    border-bottom: 1px solid var(--border-soft);
    background: #fff;
    position: sticky; top: 66px; z-index: 90;
  }
  .filter-btn {
    padding: 7px 16px;
    border: 1px solid var(--border);
    background: #fff;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .filter-btn:hover { border-color: var(--brand); color: var(--brand); }
  .filter-btn.active { background: var(--brand); color: #fff; border-color: var(--brand); }
  .filter-btn .count {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 7px;
    background: rgba(255,255,255,0.25);
    border-radius: 10px;
    font-size: 11px;
  }
  .filter-btn:not(.active) .count {
    background: var(--bg-soft);
    color: var(--text-3);
  }

  .canvas { max-width: 1400px; margin: 0 auto; padding: 32px 40px 80px; }

  .section {
    margin-bottom: 36px;
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .section-head {
    padding: 16px 24px;
    background: var(--bg-soft);
    border-bottom: 1px solid var(--border-soft);
    display: flex; align-items: center; gap: 14px;
    cursor: pointer;
    user-select: none;
  }
  .section-head:hover { background: #edf0f4; }
  .section-index {
    width: 30px; height: 30px;
    border-radius: 6px;
    background: var(--brand); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 13px;
    flex-shrink: 0;
  }
  .section-title { font-size: 16px; font-weight: 700; color: var(--text-1); }
  .section-price {
    margin-left: auto;
    font-size: 13px; color: var(--text-2);
    background: #fff;
    padding: 3px 10px;
    border: 1px solid var(--border);
    border-radius: 12px;
    font-weight: 600;
  }
  .section-toggle {
    color: var(--text-3);
    font-size: 14px;
    transition: transform 0.2s;
  }
  .section.collapsed .section-toggle { transform: rotate(-90deg); }
  .section.collapsed .section-body { display: none; }

  .section-body { padding: 20px 24px; }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 14px;
  }

  .card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex; flex-direction: column;
    gap: 10px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .card:hover {
    border-color: var(--brand);
    box-shadow: 0 4px 14px rgba(26,45,92,0.06);
  }
  .card-head {
    display: flex; align-items: flex-start; gap: 10px;
    justify-content: space-between;
  }
  .card-name {
    font-size: 14px;
    font-weight: 700;
    color: var(--text-1);
    line-height: 1.4;
  }
  .card-name .sub {
    display: block;
    font-size: 11px;
    color: var(--text-3);
    font-weight: 400;
    margin-top: 2px;
  }
  .status-tag {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
    white-space: nowrap;
  }
  .status-tag::before {
    content: '';
    width: 6px; height: 6px; border-radius: 50%;
    display: inline-block;
  }
  .status-tag.ok { background: var(--st-ok-soft); color: #065f46; }
  .status-tag.ok::before { background: var(--st-ok); }
  .status-tag.partial { background: var(--st-partial-soft); color: #92400e; }
  .status-tag.partial::before { background: var(--st-partial); }
  .status-tag.new { background: var(--st-new-soft); color: #991b1b; }
  .status-tag.new::before { background: var(--st-new); }
  .status-tag.hide { background: var(--st-hide-soft); color: #374151; }
  .status-tag.hide::before { background: var(--st-hide); }

  .card-ievents {
    font-size: 12px;
    color: var(--text-2);
    background: var(--bg-soft);
    padding: 8px 10px;
    border-radius: 6px;
    border-left: 3px solid var(--border);
  }
  .card-ievents .label {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    color: var(--text-3);
    letter-spacing: 0.5px;
    margin-right: 6px;
  }
  .card-ievents a { color: var(--brand); text-decoration: none; word-break: break-all; }
  .card-ievents a:hover { text-decoration: underline; }
  .card-ievents.empty { color: var(--text-4); font-style: italic; }

  .card-note {
    font-size: 12px;
    color: var(--text-2);
    background: #fff7ed;
    padding: 8px 10px;
    border-radius: 6px;
    border-left: 3px solid #fb923c;
    line-height: 1.5;
  }
  .card-note .label {
    display: inline-block;
    font-size: 10px;
    font-weight: 700;
    color: #9a3412;
    letter-spacing: 0.5px;
    margin-right: 6px;
  }
  .card-note.plain {
    background: var(--bg-soft);
    border-left-color: var(--border);
  }
  .card-note.plain .label { color: var(--text-3); }

  .card.hidden { display: none; }

  .footer {
    max-width: 1400px; margin: 0 auto;
    padding: 24px 40px 40px;
    font-size: 12px; color: var(--text-4); text-align: center;
    border-top: 1px solid var(--border-soft);
  }
  .footer a { color: var(--text-3); }

  @media (max-width: 768px) {
    .header, .summary-bar, .filter-bar, .canvas, .footer {
      padding-left: 20px; padding-right: 20px;
    }
    .cards { grid-template-columns: 1fr; }
    .filter-bar { top: 66px; }
    .stats { gap: 16px; }
  }
</style>
</head>

    <h1>承興 vs iEvents 架構對照<span class="sub">Backend Scope Analysis · 2026/02/23 報價單為準</span></h1>

// =====================================================
// 渲染
// =====================================================
const STATUS_LABEL = {
  ok: '可用',
  partial: '部分可用',
  new: '需新做',
  hide: '隱藏'
};

const canvas = document.getElementById('canvas');
const stats = { ok: 0, partial: 0, new: 0, hide: 0 };

sections.forEach((sec, si) => {
  const section = document.createElement('section');
  section.className = 'section';

  const head = document.createElement('div');
  head.className = 'section-head';
  head.innerHTML = `
    <div class="section-index">${si + 1}</div>
    <div class="section-title">${sec.title}</div>
    <div class="section-price">${sec.price}</div>
    <div class="section-toggle">▾</div>
  `;
  head.addEventListener('click', () => section.classList.toggle('collapsed'));
  section.appendChild(head);

  const body = document.createElement('div');
  body.className = 'section-body';

  const cards = document.createElement('div');
  cards.className = 'cards';

  sec.items.forEach(item => {
    stats[item.status]++;

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.status = item.status;

    const statusLabel = STATUS_LABEL[item.status];
    const ieventsHtml = item.ievents
      ? `<div class="card-ievents"><span class="label">iEvents</span>${escapeHtml(item.ievents)}</div>`
      : `<div class="card-ievents empty"><span class="label">iEvents</span>無對應切版</div>`;

    const noteHtml = item.note
      ? `<div class="card-note ${item.status === 'hide' ? 'plain' : ''}"><span class="label">備註給程式</span>${escapeHtml(item.note)}</div>`
      : '';

    card.innerHTML = `
      <div class="card-head">
        <div class="card-name">${escapeHtml(item.name)}${item.sub ? `<span class="sub">${escapeHtml(item.sub)}</span>` : ''}</div>
        <span class="status-tag ${item.status}">${statusLabel}</span>
      </div>
      ${ieventsHtml}
      ${noteHtml}
    `;
    cards.appendChild(card);
  });

  body.appendChild(cards);
  section.appendChild(body);
  canvas.appendChild(section);
});

// 統計
const total = stats.ok + stats.partial + stats.new + stats.hide;
document.getElementById('stat-total').textContent = total;
document.getElementById('stat-ok').textContent = stats.ok;
document.getElementById('stat-partial').textContent = stats.partial;
document.getElementById('stat-new').textContent = stats.new;
document.getElementById('stat-hide').textContent = stats.hide;
document.getElementById('count-all').textContent = total;
document.getElementById('count-ok').textContent = stats.ok;
document.getElementById('count-partial').textContent = stats.partial;
document.getElementById('count-new').textContent = stats.new;
document.getElementById('count-hide').textContent = stats.hide;

// 篩選
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filter = btn.dataset.filter;
    document.querySelectorAll('.card').forEach(card => {
      if (filter === 'all' || card.dataset.status === filter) {
        card.classList.remove('hidden');
      } else {
        card.classList.add('hidden');
      }
    });
    // Hide empty sections
    document.querySelectorAll('.section').forEach(section => {
      const visibleCards = section.querySelectorAll('.card:not(.hidden)').length;
      section.style.display = visibleCards === 0 ? 'none' : '';
    });
  });
});

function escapeHtml(s) {
  if (s == null) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
